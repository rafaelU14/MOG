<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOG | Stats</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .question-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #ccc;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff00cc;
        }

        .value-display {
            float: right;
            color: #ff00cc;
            font-weight: bold;
        }

        .calc-btn {
            width: 100%;
            background-color: #fff;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .calc-btn:hover {
            background-color: #ff00cc;
            color: white;
            transform: translateY(-2px);
        }

        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h2>MOG Stats</h2>
    
    <div class="question-group">
        <label>How good looking are you? <span class="value-display" id="val1">5</span></label>
        <input type="range" min="1" max="10" value="5" oninput="updateVal('val1', this.value)" id="q1">
    </div>

    <div class="question-group">
        <label>How would you rate yourself as a person? <span class="value-display" id="val2">5</span></label>
        <input type="range" min="1" max="10" value="5" oninput="updateVal('val2', this.value)" id="q2">
    </div>

    <div class="question-group">
        <label>How quirky are you? <span class="value-display" id="val3">5</span></label>
        <input type="range" min="1" max="10" value="5" oninput="updateVal('val3', this.value)" id="q3">
    </div>

    <div class="question-group">
        <label>How many books do you read a year? <span class="value-display" id="val4">5</span></label>
        <input type="range" min="0" max="50" value="5" oninput="updateVal('val4', this.value)" id="q4">
    </div>

    <button class="calc-btn" onclick="calculateMog()">GET MY SCORE</button>

    <div id="result">
        Tu Mog Score es: <span id="score-num">0</span>
    </div>
</div>

<script>
    function updateVal(id, val) {
        document.getElementById(id).innerText = val;
    }

    function calculateMog() {
        const v1 = parseInt(document.getElementById('q1').value);
        const v2 = parseInt(document.getElementById('q2').value);
        const v3 = parseInt(document.getElementById('q3').value);
        const v4 = parseInt(document.getElementById('q4').value);

        // Una fórmula de ejemplo: (Belleza * 2) + Persona - (Quirky/2) + (Libros/5)
        let score = (v1 * 2) + v2 - (v3 * 0.5) + (v4 * 0.2);
        score = Math.round(score * 10) / 10;

        document.getElementById('score-num').innerText = score;
        document.getElementById('result').style.display = 'block';
        
        if(score > 20) {
            alert("Absolute Mogger! 🗿");
        } else {
            alert("Keep working on your aura...");
        }
    }
</script>

</body>
</html>
